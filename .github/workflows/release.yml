name: Build beta artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            package_script: package:mac
            artifact_name: yPrompter-macOS
            artifact_paths: |
              release/*.dmg
              release/*.dmg.blockmap
              release/latest-mac.yml
          - name: Windows
            os: windows-latest
            package_script: package:win
            artifact_name: yPrompter-Windows
            artifact_paths: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package unsigned beta
        run: npm run ${{ matrix.package_script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.ref_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 30
